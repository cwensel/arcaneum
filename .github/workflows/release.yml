name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: write

jobs:
  tests:
    name: Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
      checks: write

  build:
    name: Build and Release
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

          fail=0
          check() {
            local label="$1" actual="$2"
            if [ "$actual" != "$TAG_VERSION" ]; then
              echo "ERROR: $label version ($actual) does not match tag ($TAG_VERSION)"
              fail=1
            else
              echo "  ✓ $label: $actual"
            fi
          }

          check "pyproject.toml" \
            "$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          check "src/arcaneum/__init__.py" \
            "$(python -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('src/arcaneum/__init__.py').read()).group(1))")"
          check ".claude-plugin/plugin.json" \
            "$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          check ".claude-plugin/marketplace.json (plugins[0].version)" \
            "$(python -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")"

          # README install URLs should reference this tag
          if ! grep -qF "/download/v${TAG_VERSION}/arcaneum-${TAG_VERSION}" README.md; then
            echo "ERROR: README.md does not reference v${TAG_VERSION} download URLs"
            fail=1
          else
            echo "  ✓ README.md references v${TAG_VERSION}"
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "All version references match tag: $TAG_VERSION"

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
