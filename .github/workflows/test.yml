name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  checks: write
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: production
          MEILI_MASTER_KEY: ci-test-master-key-change-me-please-32c
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/arcaneum/models
            ~/.cache/fastembed
          key: ml-models-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ml-models-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        env:
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_API_KEY: ci-test-master-key-change-me-please-32c
        run: |
          pytest tests/unit tests/fulltext tests/schema \
            --junit-xml=test-results/unit.xml \
            --cov=src/arcaneum \
            --cov-report=xml:coverage/unit.xml \
            --cov-report=term-missing \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: test-results/unit.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-py${{ matrix.python-version }}
          path: coverage/unit.xml

      - name: Report test summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always()
        with:
          name: Unit Test Results (py${{ matrix.python-version }})
          path: test-results/unit.xml
          reporter: java-junit

  integration-tests:
    name: Integration Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      qdrant:
        image: qdrant/qdrant:v1.16.2
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: development
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
