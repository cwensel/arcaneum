      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage-py${{ matrix.python-version }}
          path: coverage/integration.xml

      - name: Report test summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always()
        with:
          name: Integration Test Results (py${{ matrix.python-version }})
          path: test-results/integration.xml
          reporter: java-junit

  cli-tests:
    name: CLI Tests (py${{ matrix.python-version }})
