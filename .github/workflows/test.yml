          key: ml-models-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ml-models-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          QDRANT_URL: http://localhost:6333
          MEILI_URL: http://localhost:7700
        run: |
          pytest tests/integration tests/indexing \
            tests/test_collection_creation.py tests/test_export_import.py \
            --junit-xml=test-results/integration.xml \
            --cov=src/arcaneum \
            --cov-report=xml:coverage/integration.xml \
            --cov-report=term-missing \
