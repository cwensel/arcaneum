name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.0)'
        required: true

permissions:
  contents: read

jobs:
  update-tap:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.draft == false && github.event.release.prerelease == false)

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG, version: $VERSION"

      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          TARBALL_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/arcaneum-${{ steps.release.outputs.version }}.tar.gz"
          echo "Downloading $TARBALL_URL"
          curl -sfL "$TARBALL_URL" -o arcaneum.tar.gz
          SHA256=$(sha256sum arcaneum.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          FORMULA="homebrew/Formula/arcaneum.rb"

          sed -i "s|^  url \".*\"$|  url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/arcaneum-${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "s|^  sha256 \".*\"$|  sha256 \"${SHA256}\"|" "$FORMULA"

          echo "Updated formula:"
          cat "$FORMULA"

      - name: Push to Homebrew tap repo
        uses: cpina/github-action-push-to-another-repository@07c4d7b3def0a8ebe788a8f2c843a4e1de4f6900 # v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source-directory: 'homebrew'
          destination-github-username: 'cwensel'
          destination-repository-name: 'homebrew-arcaneum'
          target-branch: 'main'
          commit-message: 'Update arcaneum to ${{ steps.release.outputs.tag }}'
